<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Reckoning</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;font-family:inherit}
body{
  background:#0a0a0f;
  color:#c0f0ff;
  font-family:'Cascadia Code','Consolas','Courier New',monospace;
  font-weight:600;
  -webkit-font-smoothing:antialiased;
  letter-spacing:0.5px;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  height:100vh;
  overflow:hidden;
}
#game{
  width:860px;
  max-width:100%;
  padding:8px;
  height:100vh;
  display:flex;
  flex-direction:column;
}
h1{
  text-align:center;
  color:#ff2a6d;
  text-shadow:0 0 10px #ff2a6d,0 0 30px #ff2a6d88;
  font-size:1.4rem;
  letter-spacing:3px;
  margin-bottom:1px;
}
.subtitle{
  text-align:center;
  color:#05d5ff;
  font-size:.75rem;
  margin-bottom:6px;
  letter-spacing:2px;
}
/* layout */
.row{display:flex;gap:8px;flex:1;min-height:0}
.col-left{flex:0 0 auto;width:430px}
.col-right{flex:1;min-width:260px;display:flex;flex-direction:column}
/* panels */
.panel{
  border:1px solid #1a3a4a;
  background:#0d1117;
  padding:6px 8px;
  margin-bottom:6px;
}
.panel h2{
  color:#ff2a6d;
  font-size:.8rem;
  letter-spacing:2px;
  border-bottom:1px solid #1a3a4a;
  padding-bottom:2px;
  margin-bottom:4px;
}
/* grid */
#grid{
  display:grid;
  grid-template-columns:repeat(10,1fr);
  gap:2px;
  margin:0 auto;
  max-width:400px;
}
.cell{
  aspect-ratio:1;
  border:1px solid #1a3a4a;
  background:#0d1117;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1rem;
  cursor:pointer;
  transition:all .15s;
  position:relative;
}
.cell.visited{background:#0f1a22}
.cell.current{border-color:#ff2a6d;box-shadow:0 0 8px #ff2a6d88}
.cell.adjacent{border-color:#05d5ff55;cursor:pointer}
.cell.adjacent:hover{background:#05d5ff22;border-color:#05d5ff}
.cell.locked{opacity:.6}
.cell.cleared{background:#1a0a14!important}
.cell.key{color:#ffcc00}
/* stats bars */
.stat-row{
  display:flex;
  justify-content:space-between;
  margin:1px 0;
  font-size:.8rem;
}
.bar-bg{
  width:100%;
  height:5px;
  background:#1a2a33;
  margin:1px 0 4px;
}
.bar-fill{
  height:100%;
  transition:width .3s;
}
.bar-hp{background:#ff2a6d}
.bar-xp{background:#05d5ff}
.stat-val{color:#ffcc00}
/* log */
#log{
  height:105px;
  overflow-y:auto;
  font-size:.78rem;
  line-height:1.4;
}
#log .msg{color:#7a9aaa}
#log .combat{color:#ff8c42}
#log .loot{color:#ffcc00}
#log .danger{color:#ff2a6d}
#log .info{color:#05d5ff}
#log .win{color:#39ff14}
/* buttons */
.btn{
  background:#0d1117;
  border:1px solid #1a3a4a;
  color:#05d5ff;
  font-family:inherit;
  font-size:.78rem;
  padding:4px 10px;
  cursor:pointer;
  letter-spacing:1px;
  transition:all .15s;
}
.btn:hover{background:#05d5ff22;border-color:#05d5ff}
.btn.danger{color:#ff2a6d;border-color:#ff2a6d44}
.btn.danger:hover{background:#ff2a6d22;border-color:#ff2a6d}
.btn.gold{color:#ffcc00;border-color:#ffcc0044}
.btn.gold:hover{background:#ffcc0022;border-color:#ffcc00}
.btn-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
/* combat panel - inline */
#combatPanel{
  display:none;
  border:1px solid #ff8c42;
  background:#0f111a;
  padding:6px 8px;
  margin-bottom:6px;
}
#combatPanel.active{display:block}
#combatPanel h2{color:#ff8c42;font-size:.8rem;letter-spacing:2px;border-bottom:1px solid #3a2a1a;padding-bottom:2px;margin-bottom:4px}
#combatPanel .enemy-name{color:#ff8c42;font-weight:bold;font-size:.85rem}
#combatPanel .enemy-desc{color:#7a9aaa;font-size:.75rem;margin-bottom:4px}
/* inventory */
.inv-item{
  display:flex;
  justify-content:space-between;
  font-size:.78rem;
  padding:2px 3px;
  border-bottom:1px solid #1a2a3344;
}
.inv-item.clickable{cursor:pointer}
.inv-item.clickable:hover{background:#05d5ff11}
.inv-item .use{color:#39ff14;cursor:pointer}
.inv-item .use:hover{text-decoration:underline}
/* modal overlay - only for game over */
.overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:#000000cc;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:100;
}
.modal{
  background:#0d1117;
  border:2px solid #ff2a6d;
  padding:24px;
  max-width:400px;
  text-align:center;
  box-shadow:0 0 40px #ff2a6d44;
}
.modal h2{color:#ff2a6d;margin-bottom:12px;letter-spacing:3px}
.modal p{color:#7a9aaa;margin-bottom:14px;font-size:.8rem}
.dice-display{
  font-size:2rem;
  color:#ffcc00;
  margin:8px 0;
}
</style>
</head>
<body>
<div id="game">
  <h1>⚡ NEON RECKONING</h1>
  <div class="subtitle">// DESCEND INTO THE SPIRE //</div>
  <div class="row">
    <div class="col-left">
      <div class="panel">
        <h2>◈ GRID</h2>
        <div id="grid"></div>
        <div style="margin-top:6px;font-size:.65rem;color:#4a6a7a;text-align:center">
          ⬆⬇⬅➡ move &nbsp;|&nbsp; ◆ boss room &nbsp;|&nbsp; ⚑ start
        </div>
      </div>
    </div>
    <div class="col-right">
      <div class="panel">
        <h2>◈ STATS</h2>
        <div class="stat-row"><span>HP</span><span class="stat-val" id="hpText">20/20</span></div>
        <div class="bar-bg"><div class="bar-fill bar-hp" id="hpBar" style="width:100%"></div></div>
        <div class="stat-row"><span>ATK</span><span class="stat-val" id="atkVal">+2</span></div>
        <div class="stat-row"><span>DEF</span><span class="stat-val"><span id="defVal">3</span></span></div>
        <div class="stat-row"><span>EVD</span><span class="stat-val"><span id="evdVal">2</span></span></div>
        <div class="stat-row"><span>Level</span><span class="stat-val" id="lvlVal">1</span></div>
        <div class="stat-row"><span>Creds</span><span class="stat-val" id="credsVal">0</span></div>
        <div class="stat-row"><span>XP</span><span class="stat-val" id="xpText">0/10</span></div>
        <div class="bar-bg"><div class="bar-fill bar-xp" id="xpBar" style="width:0%"></div></div>
      </div>
      <div class="panel">
        <h2>◈ INVENTORY</h2>
        <div id="inv"></div>
        <div style="margin-top:6px;font-size:.65rem;color:#05d5ff" id="keyStatus">🔑 No key</div>
      </div>
    </div>
  </div>
  <div class="panel">
    <h2>◈ EVENT LOG</h2>
    <div id="log"><div class="msg">System booting...</div></div>
  </div>
  <div class="panel" id="combatPanel">
    <h2>⚔ COMBAT</h2>
    <div class="enemy-name" id="combatEnemyName"></div>
    <div class="enemy-desc" id="combatEnemyDesc"></div>
    <div class="stat-row"><span>Enemy HP</span><span class="stat-val" id="combatEnemyHp"></span></div>
    <div class="bar-bg"><div class="bar-fill bar-hp" id="combatEnemyHpBar"></div></div>
    <div class="stat-row"><span>Enemy ATK</span><span class="stat-val" id="combatEnemyAtk"></span> <span style="margin-left:8px">EVD</span><span class="stat-val" id="combatEnemyEvd"></span> <span style="margin-left:8px">DEF</span><span class="stat-val" id="combatEnemyDef"></span></div>
    <div class="stat-row" style="margin-top:6px"><span>Your  ATK</span><span class="stat-val" id="combatPlayerAtk"></span> <span style="margin-left:8px">EVD</span><span class="stat-val" id="combatPlayerEvd"></span> <span style="margin-left:8px">DEF</span><span class="stat-val" id="combatPlayerDef"></span></div>
    <div class="btn-row">
      <button class="btn danger" onclick="playerAttack()">⚔ <u>A</u>ttack</button>
      <button class="btn" id="fleeBtn" onclick="playerFlee()">↩ <u>F</u>lee</button>
    </div>
  </div>
  <div class="btn-row" style="justify-content:center;margin-top:6px">
    <button class="btn" onclick="newGame()">⟳ NEW RUN</button>
  </div>
</div>
<div id="overlayContainer"></div>

<script>
// ==================== GAME STATE ====================
const GRID_SIZE = 10;

let state = {
  grid: [],         // 2D array of room objects
  px: 0, py: 0,    // player position
  hp: 20, maxHp: 20,
  atk: 2,
  def: 3,
  evd: 2,
  level: 1,
  xp: 0, xpToLevel: 10,
  creds: 0,
  weapon: { name: 'Rusty Pipe', dice: 4, bonus: 0 },
  armor: { name: 'Torn Jacket', def: 0 },
  inventory: [],   // [{name, type:'weapon'|'armor'|'heal', ...}]
  hasKey: false,
  bossDefeated: false,
  bossRevealed: false,
  intelRoom: null,
  gameOver: false,
  visited: new Set(),
  bossRoom: null,  // {x,y}
  keyRoom: null,   // {x,y}
  vaultRoom: null,  // weapon vault
  vaultRoom2: null, // DEF armor vault
  vaultRoom3: null, // EVD armor vault
};

// ==================== ROOM GENERATION ====================
function generateFloor() {
  // Create empty grid
  state.grid = Array.from({length: GRID_SIZE}, () => Array.from({length: GRID_SIZE}, () => ({ type: 'empty' })));
  state.visited = new Set();
  state.visited.add('0,0');

  // Pick random boss room (not adjacent to start)
  let candidates = [];
  for (let y = 0; y < GRID_SIZE; y++) {
    for (let x = 0; x < GRID_SIZE; x++) {
      if (x === 0 && y === 0) continue;
      let dist = Math.abs(x - 0) + Math.abs(y - 0);
      if (dist >= 3) candidates.push({x, y});
    }
  }
  let boss = candidates[Math.floor(Math.random() * candidates.length)];
  state.bossRoom = boss;
  state.grid[boss.y][boss.x] = { type: 'boss', locked: true };

  // Pick random key room (not start, not boss)
  candidates = [];
  for (let y = 0; y < GRID_SIZE; y++) {
    for (let x = 0; x < GRID_SIZE; x++) {
      if ((x === 0 && y === 0) || (x === boss.x && y === boss.y)) continue;
      candidates.push({x, y});
    }
  }
  let key = candidates[Math.floor(Math.random() * candidates.length)];
  state.keyRoom = key;
  state.grid[key.y][key.x] = { type: 'key' };

  // Pick random intel room (not start, boss, or key)
  candidates = [];
  for (let y = 0; y < GRID_SIZE; y++) {
    for (let x = 0; x < GRID_SIZE; x++) {
      if ((x === 0 && y === 0) || (x === boss.x && y === boss.y) || (x === key.x && y === key.y)) continue;
      candidates.push({x, y});
    }
  }
  let intel = candidates[Math.floor(Math.random() * candidates.length)];
  state.intelRoom = intel;
  state.grid[intel.y][intel.x] = { type: 'intel' };

  // Pick random vault room (not start, boss, key, or intel)
  candidates = [];
  for (let y = 0; y < GRID_SIZE; y++) {
    for (let x = 0; x < GRID_SIZE; x++) {
      if ((x === 0 && y === 0) || (x === boss.x && y === boss.y) || (x === key.x && y === key.y) || (x === intel.x && y === intel.y)) continue;
      candidates.push({x, y});
    }
  }
  let vault = candidates[Math.floor(Math.random() * candidates.length)];
  state.vaultRoom = vault;
  state.grid[vault.y][vault.x] = { type: 'vault' };

  // Pick second vault room (not start, boss, key, intel, or first vault)
  candidates = [];
  for (let y = 0; y < GRID_SIZE; y++) {
    for (let x = 0; x < GRID_SIZE; x++) {
      if ((x === 0 && y === 0) || (x === boss.x && y === boss.y) || (x === key.x && y === key.y) || (x === intel.x && y === intel.y) || (x === vault.x && y === vault.y)) continue;
      candidates.push({x, y});
    }
  }
  let vault2 = candidates[Math.floor(Math.random() * candidates.length)];
  state.vaultRoom2 = vault2;
  state.grid[vault2.y][vault2.x] = { type: 'vault2' };

  // Pick third vault room (not start, boss, key, intel, or first two vaults)
  candidates = [];
  for (let y = 0; y < GRID_SIZE; y++) {
    for (let x = 0; x < GRID_SIZE; x++) {
      if ((x === 0 && y === 0) || (x === boss.x && y === boss.y) || (x === key.x && y === key.y) || (x === intel.x && y === intel.y) || (x === vault.x && y === vault.y) || (x === vault2.x && y === vault2.y)) continue;
      candidates.push({x, y});
    }
  }
  let vault3 = candidates[Math.floor(Math.random() * candidates.length)];
  state.vaultRoom3 = vault3;
  state.grid[vault3.y][vault3.x] = { type: 'vault3' };

  // Fill remaining rooms
  let roomTypes = ['enemy', 'enemy', 'enemy', 'enemy', 'loot', 'loot', 'loot', 'heal', 'trap', 'empty'];
  for (let y = 0; y < GRID_SIZE; y++) {
    for (let x = 0; x < GRID_SIZE; x++) {
      if (x === 0 && y === 0) continue;
      if (x === boss.x && y === boss.y) continue;
      if (x === key.x && y === key.y) continue;
      if (x === intel.x && y === intel.y) continue;
      if (x === vault.x && y === vault.y) continue;
      if (x === vault2.x && y === vault2.y) continue;
      if (x === vault3.x && y === vault3.y) continue;
      let t = roomTypes[Math.floor(Math.random() * roomTypes.length)];
      state.grid[y][x] = { type: t };
    }
  }
}

// ==================== ENEMIES ====================
const enemyPool = [
  { name: 'Glitch Drone',    hp: 10, atk: 2, def: 2, evd: 1, dice: 4, xp: 3, creds: 15 },
  { name: 'Chrome Ganger',   hp: 14, atk: 3, def: 3, evd: 2, dice: 6, xp: 5, creds: 25 },
  { name: 'CorpSec Enforcer',hp: 18, atk: 4, def: 3, evd: 2, dice: 6, xp: 7, creds: 35 },
  { name: 'Rogue Drone Swarm',hp:12,atk: 3, def: 2, evd: 3, dice: 8, xp: 6, creds: 30 },
];

function getEnemyForFloor() {
  let pool = enemyPool.slice(0, Math.min(state.level + 1, enemyPool.length));
  let e = pool[Math.floor(Math.random() * pool.length)];
  return {
    name: e.name,
    hp: e.hp + state.level * 4,
    maxHp: e.hp + state.level * 4,
    atk: e.atk,
    def: e.def,
    evd: e.evd,
    dice: e.dice,
    xp: e.xp + state.level,
    creds: e.creds + state.level * 5,
  };
}

function getBoss() {
  const bosses = [
    { name: 'OVERSEER v2.0',  hp: 40, maxHp:40, atk: 5, def: 4, evd: 3, dice: 10, xp: 20, creds: 120,
      desc: 'A massive security AI core, crackling with malevolent energy.' },
    { name: 'CYBER-LICH',     hp: 35, maxHp:35, atk: 6, def: 4, evd: 4, dice: 8, xp: 18, creds: 100,
      desc: 'A former netrunner fused with the Spire\'s mainframe.' },
  ];
  return bosses[Math.floor(Math.random() * bosses.length)];
}

// ==================== DICE ROLLING ====================
function roll(sides) { return Math.floor(Math.random() * sides) + 1; }

// ==================== COMBAT ====================
let combatEnemy = null;

function startCombat(enemy) {
  combatEnemy = { ...enemy };
  let panel = document.getElementById('combatPanel');
  panel.classList.add('active');
  document.getElementById('fleeBtn').disabled = !!enemy._isBoss;
  updateCombatPanel();
}

function updateCombatPanel() {
  let e = combatEnemy;
  if (!e) return;
  document.getElementById('combatEnemyName').textContent = e.name;
  document.getElementById('combatEnemyDesc').textContent = e.desc || '';
  document.getElementById('combatEnemyHp').textContent = `${e.hp}/${e.maxHp}`;
  document.getElementById('combatEnemyHpBar').style.width = `${(e.hp/e.maxHp)*100}%`;
  document.getElementById('combatEnemyAtk').textContent = `d${e.dice}+${e.atk}`;
  document.getElementById('combatEnemyEvd').textContent = e.evd;
  document.getElementById('combatEnemyDef').textContent = e.def;
  let totalAtk = state.atk + state.weapon.bonus;
  document.getElementById('combatPlayerAtk').textContent = `d${state.weapon.dice}+${totalAtk}`;
  document.getElementById('combatPlayerEvd').textContent = state.evd;
  document.getElementById('combatPlayerDef').textContent = state.def;
}

function endCombat() {
  combatEnemy = null;
  document.getElementById('combatPanel').classList.remove('active');
}

function playerAttack() {
  if (!combatEnemy) return;
  let e = combatEnemy;
  let totalAtk = state.atk + state.weapon.bonus;
  let dmgRoll = roll(state.weapon.dice) + totalAtk;

  if (dmgRoll <= e.evd) {
    addLog(`💨 ${e.name} evaded! (d${state.weapon.dice}+${totalAtk}=${dmgRoll} ≤ EVD ${e.evd})`, 'combat');
  } else if (dmgRoll <= e.def) {
    addLog(`🛡️ ${e.name} blocked! (d${state.weapon.dice}+${totalAtk}=${dmgRoll} > EVD ${e.evd}, ≤ DEF ${e.def})`, 'combat');
  } else {
    let dmg = dmgRoll - e.def;
    e.hp -= dmg;
    addLog(`🎯 You hit ${e.name} for <b>${dmg}</b> damage. (d${state.weapon.dice}+${totalAtk}=${dmgRoll} - ${e.def} DEF)`, 'combat');
  }

  if (e.hp <= 0) {
    let wasBoss = e._isBoss;
    endCombat();
    state.xp += (e.xp || 0);
    state.creds += (e.creds || 0);
    checkLevelUp();
    state.grid[state.py][state.px] = { type: 'empty' };
    if (wasBoss) {
      addLog(`💀 ${e.name} DESTROYED!`, 'win');
      gameOverWin();
    } else {
      addLog(`💀 ${e.name} destroyed! +${e.xp} XP, +${e.creds}¢`, 'win');
    }
    render();
    return;
  }

  // Enemy counter-attacks after a short delay
  updateCombatPanel();
  setTimeout(() => enemyAttack(), 500);
}

function enemyAttack() {
  if (!combatEnemy) return;
  let e = combatEnemy;
  let dmgRoll = roll(e.dice) + e.atk;

  if (dmgRoll <= state.evd) {
    addLog(`💨 You evade ${e.name}! (d${e.dice}+${e.atk}=${dmgRoll} ≤ EVD ${state.evd})`, 'info');
  } else if (dmgRoll <= state.def) {
    addLog(`🛡️ Your armor blocks ${e.name}! (d${e.dice}+${e.atk}=${dmgRoll} > EVD ${state.evd}, ≤ DEF ${state.def})`, 'info');
  } else {
    let dmg = dmgRoll - state.def;
    state.hp -= dmg;
    addLog(`💥 ${e.name} hits you for <b>${dmg}</b> damage. (d${e.dice}+${e.atk}=${dmgRoll} - ${state.def} DEF)`, 'danger');
  }

  if (state.hp <= 0) {
    state.hp = 0;
    endCombat();
    gameOverLose();
    return;
  }

  updateCombatPanel();
  render(); // update your HP bar
}

function playerFlee() {
  if (!combatEnemy) return;
  let fleeRoll = roll(state.weapon.dice) + state.atk + state.weapon.bonus;
  let enemyRoll = roll(combatEnemy.dice) + combatEnemy.atk;
  // Mark room as fled so enemy stays
  state.grid[state.py][state.px].fled = true;
  endCombat();
  if (fleeRoll >= enemyRoll - 2) {
    addLog('↩ You fled successfully.', 'info');
  } else {
    let dmg = roll(4);
    state.hp -= dmg;
    addLog(`↩ Failed to flee! Enemy strikes for <b>${dmg}</b> damage.`, 'danger');
    if (state.hp <= 0) { state.hp = 0; gameOverLose(); return; }
  }
  render();
}

// ==================== ROOM ACTIONS ====================
function enterRoom(x, y) {
  if (state.gameOver) return;

  let room = state.grid[y][x];

  // Boss room - check if locked
  if (room.type === 'boss') {
    if (room.locked && !state.hasKey) {
      addLog('🔒 The boss chamber is locked. You need a key.', 'danger');
      return;
    }
    if (room.locked && state.hasKey) {
      room.locked = false;
      addLog('🔑 You use the key. The door slides open with a hiss of steam...', 'info');
      state.hasKey = false;
      updateKeyStatus();
      render();
      return; // Don't auto-fight — player must choose to enter
    }
    // Boss room is unlocked — prompt to accept
    if (!room.locked) {
      showBossPrompt();
      return;
    }
  }

  // Move player
  state.px = x;
  state.py = y;
  state.visited.add(`${x},${y}`);

  switch (room.type) {
    case 'empty':
      addLog('The room is dark and empty. Flickering neon through broken windows.', 'msg');
      break;
    case 'enemy': {
      let enemy = getEnemyForFloor();
      addLog(`⚠ ${enemy.name} detected!`, 'danger');
      startCombat(enemy);
      break;
    }
    case 'key':
      state.hasKey = true;
      state.grid[y][x] = { type: 'key', cleared: true };
      addLog('🔑 You found an access keycard! The boss chamber can now be unlocked.', 'loot');
      updateKeyStatus();
      break;
    case 'intel':
      state.bossRevealed = true;
      state.grid[y][x] = { type: 'intel', cleared: true };
      addLog('💡 Intel terminal! Boss location revealed on the grid (◆).', 'loot');
      break;
    case 'vault':
      state.grid[y][x] = { type: 'vault', cleared: true };
      state.inventory.push({ name: 'Synth-Katana', type: 'weapon', dice: 10, bonus: 2 });
      addLog('🏦 Armory vault breached! Found Synth-Katana (d10+2).', 'loot');
      break;
    case 'vault2':
      state.grid[y][x] = { type: 'vault2', cleared: true };
      state.inventory.push({ name: 'Chrome Carapace', type: 'armor', def: 4, evd: 1 });
      addLog('🏦 DEF vault breached! Found Chrome Carapace (+4 DEF / +1 EVD).', 'loot');
      break;
    case 'vault3':
      state.grid[y][x] = { type: 'vault3', cleared: true };
      state.inventory.push({ name: 'Ghost-Walk Rig', type: 'armor', def: 1, evd: 4 });
      addLog('🏦 EVD vault breached! Found Ghost-Walk Rig (+1 DEF / +4 EVD).', 'loot');
      break;
    case 'loot':
      handleLootRoom();
      state.grid[y][x] = { type: 'empty' };
      break;
    case 'heal':
      let healAmt = roll(8) + 4;
      state.hp = Math.min(state.maxHp, state.hp + healAmt);
      addLog(`💚 Med-station restored ${healAmt} HP.`, 'info');
      state.grid[y][x] = { type: 'empty' };
      break;
    case 'trap':
      let trapDmg = roll(6) + 2;
      state.hp -= trapDmg;
      addLog(`⚡ Shock trap! You take ${trapDmg} damage.`, 'danger');
      state.grid[y][x] = { type: 'empty' };
      if (state.hp <= 0) { state.hp = 0; gameOverLose(); return; }
      break;
  }

  render();
}

function showBossPrompt() {
  let boss = getBoss();
  // Use combat panel to show boss preview with Accept/Decline
  let panel = document.getElementById('combatPanel');
  panel.classList.add('active');
  document.getElementById('combatEnemyName').textContent = boss.name + ' (BOSS)';
  document.getElementById('combatEnemyDesc').textContent = boss.desc;
  document.getElementById('combatEnemyHp').textContent = `${boss.hp}/${boss.hp}`;
  document.getElementById('combatEnemyHpBar').style.width = '100%';
  document.getElementById('combatEnemyAtk').textContent = `d${boss.dice}+${boss.atk}`;
  document.getElementById('combatEnemyEvd').textContent = boss.evd;
  document.getElementById('combatEnemyDef').textContent = boss.def;
  let totalAtk = state.atk + state.weapon.bonus;
  document.getElementById('combatPlayerAtk').textContent = `d${state.weapon.dice}+${totalAtk}`;
  document.getElementById('combatPlayerEvd').textContent = state.evd;
  document.getElementById('combatPlayerDef').textContent = state.def;
  // Replace buttons
  let btnRow = panel.querySelector('.btn-row');
  btnRow.innerHTML = `
    <button class="btn danger" onclick="acceptBossFight()">⚔ Challenge</button>
    <button class="btn" onclick="declineBoss()">↩ Step Back</button>
  `;
  // Store boss for later
  panel._pendingBoss = boss;
}

function acceptBossFight() {
  let panel = document.getElementById('combatPanel');
  let boss = panel._pendingBoss;
  panel._pendingBoss = null;
  // Restore normal combat buttons
  panel.querySelector('.btn-row').innerHTML = `
    <button class="btn danger" onclick="playerAttack()">⚔ <u>A</u>ttack</button>
    <button class="btn" id="fleeBtn" onclick="playerFlee()" disabled>↩ <u>F</u>lee</button>
  `;
  boss._isBoss = true;
  addLog(`⚠ BOSS: ${boss.name} — ${boss.desc}`, 'danger');
  startCombat(boss);
}

function declineBoss() {
  document.getElementById('combatPanel').classList.remove('active');
  document.getElementById('combatPanel')._pendingBoss = null;
  addLog('You step back from the boss chamber. Prepare yourself.', 'info');
}

function handleLootRoom() {
  let r = Math.random();
  if (r < 0.25) {
    // Weapon
    let weapons = [
      { name: 'Shock Baton',    dice: 4, bonus: 3 },
      { name: 'Mono-Katana',    dice: 6, bonus: 1 },
      { name: 'Plasma Cutter',  dice: 6, bonus: 2 },
      { name: 'Pulse Rifle',    dice: 8, bonus: 0 },
      { name: 'Scrap Cannon',   dice: 10, bonus: 0 },
      { name: 'Needle Pistol',  dice: 4, bonus: 1 },
      { name: 'Arc Blaster',    dice: 6, bonus: 3 },
      { name: 'Rail Driver',    dice: 8, bonus: 1 },
      { name: 'Thermite Axe',   dice: 8, bonus: 2 },
      { name: 'Ion Gauntlets',  dice: 6, bonus: 0 },
    ];
    let w = weapons[Math.floor(Math.random() * weapons.length)];
    state.inventory.push({ name: w.name, type: 'weapon', dice: w.dice, bonus: w.bonus });
    addLog(`🗡️ Found ${w.name} (d${w.dice}+${w.bonus}).`, 'loot');
  } else if (r < 0.50) {
    // Armor
    let armors = [
      { name: 'Kevlar Vest', def: 2, evd: 0 },
      { name: 'Plated Jacket', def: 3, evd: 0 },
      { name: 'Nano-Weave Suit', def: 1, evd: 2 },
      { name: 'Riot Shield', def: 2, evd: 0 },
      { name: 'Phase Cloak', def: 0, evd: 3 },
      { name: 'Exo Frame', def: 4, evd: 0 },
      { name: 'Reflex Mesh', def: 1, evd: 3 },
      { name: 'Hardlight Field', def: 2, evd: 2 },
    ];
    let a = armors[Math.floor(Math.random() * armors.length)];
    state.inventory.push({ name: a.name, type: 'armor', def: a.def, evd: a.evd });
    let label = a.evd > 0 ? `+${a.def} DEF / +${a.evd} EVD` : `+${a.def} DEF`;
    addLog(`🛡️ Found ${a.name} (${label}).`, 'loot');
  } else if (r < 0.72) {
    // Healing item
    state.inventory.push({ name: 'Stim-Pack', type: 'heal', amount: roll(6) + 6 });
    addLog('💉 Found a Stim-Pack.', 'loot');
  } else {
    // Creds
    let creds = roll(20) + 10;
    state.creds += creds;
    addLog(`💰 Found ${creds}¢ in a discarded cred-chip.`, 'loot');
  }
}

// ==================== LEVEL UP ====================
function checkLevelUp() {
  while (state.xp >= state.xpToLevel) {
    state.xp -= state.xpToLevel;
    state.level++;
    state.xpToLevel = Math.floor(state.xpToLevel * 1.5);
    state.maxHp += 6;
    state.hp = state.maxHp; // full heal on level up
    state.atk += 1;
    addLog(`⬆ LEVEL UP! You are now level ${state.level}. +6 max HP, +1 ATK, fully healed.`, 'win');
  }
}

// ==================== GAME OVER ====================
function gameOverLose() {
  state.gameOver = true;
  endCombat();
  addLog('💀 CONNECTION TERMINATED. You died in the Spire.', 'danger');
  render();
  showOverlay(`
    <div class="modal">
      <h2>☠ FLATLINED</h2>
      <p>Your body is another data-ghost in the Spire. Floor reached: <b>${state.level}</b></p>
      <p style="color:#ffcc00">Creds lost: ${state.creds}¢</p>
      <button class="btn danger" onclick="newGame()">⟳ JACK IN AGAIN</button>
    </div>
  `);
}

function gameOverWin() {
  state.gameOver = true;
  state.bossDefeated = true;
  addLog('🏆 BOSS DEFEATED! The Spire\'s grip on this sector is broken... for now.', 'win');
  render();
  showOverlay(`
    <div class="modal">
      <h2>🏆 SPIRE BREAKER</h2>
      <p>You destroyed the boss and escaped with <b>${state.creds}¢</b> at level <b>${state.level}</b>.</p>
      <p style="color:#39ff14">The Neon Reckoning spreads...</p>
      <button class="btn gold" onclick="newGame()">⟳ NEW RUN</button>
    </div>
  `);
}

// ==================== OVERLAY ====================
function showOverlay(html) {
  document.getElementById('overlayContainer').innerHTML = `<div class="overlay">${html}</div>`;
}
function closeOverlay() {
  document.getElementById('overlayContainer').innerHTML = '';
}

// ==================== LOG ====================
function addLog(msg, cls) {
  let log = document.getElementById('log');
  let div = document.createElement('div');
  div.className = cls || 'msg';
  div.innerHTML = '> ' + msg;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

// ==================== RENDER ====================
function render() {
  // HP
  document.getElementById('hpText').textContent = `${state.hp}/${state.maxHp}`;
  document.getElementById('hpBar').style.width = `${(state.hp / state.maxHp) * 100}%`;
  // Stats
  document.getElementById('atkVal').textContent = `d${state.weapon.dice}+${state.atk + state.weapon.bonus}`;
  document.getElementById('defVal').textContent = state.def;
  document.getElementById('evdVal').textContent = state.evd;
  document.getElementById('lvlVal').textContent = state.level;
  document.getElementById('credsVal').textContent = state.creds;
  // XP
  document.getElementById('xpText').textContent = `${state.xp}/${state.xpToLevel}`;
  document.getElementById('xpBar').style.width = `${(state.xp / state.xpToLevel) * 100}%`;
  // Key
  updateKeyStatus();
  // Grid
  renderGrid();
  // Inventory
  renderInventory();
  // Combat panel (if active)
  if (combatEnemy) updateCombatPanel();
}

function updateKeyStatus() {
  let el = document.getElementById('keyStatus');
  if (state.hasKey) {
    el.innerHTML = '🔑 KEY CARD ACQUIRED';
    el.style.color = '#ffcc00';
  } else {
    el.innerHTML = '🔒 No key';
    el.style.color = '#05d5ff';
  }
}

function renderInventory() {
  let inv = document.getElementById('inv');
  let w = state.weapon;
  let a = state.armor;
  let html = '';
  // Equipped gear
  let wDice = `d${w.dice}${w.bonus?'+'+w.bonus:''}`;
  html += `<div class="inv-item" style="color:#ff8c42">
    <span>⚔️ ${w.name} <span style="color:#ff8c4288">[${wDice}]</span></span>
  </div>`;
  html += `<div class="inv-item" style="color:#05d5ff">
    <span>🛡️ ${a.name} <span style="color:#05d5ff88">[${a.def>0?'+'+a.def+' DEF':''}${a.def>0&&a.evd>0?' / ':''}${a.evd>0?'+'+a.evd+' EVD':''}${a.def===0&&a.evd===0?'—':''}]</span></span>
  </div>`;
  if (state.inventory.length === 0) {
    html += '<div style="color:#4a6a7a;font-size:.7rem;padding-top:4px">no items</div>';
  } else {
    html += state.inventory.map((item, i) => {
      let label, action, stat;
      if (item.type === 'weapon') {
        label = item.name;
        stat = `[d${item.dice}${item.bonus?'+'+item.bonus:''}]`;
        action = `<span class="use" onclick="equipItem(${i})">[equip]</span>`;
      } else if (item.type === 'armor') {
        label = item.name;
        stat = item.evd > 0 ? `[+${item.def} DEF / +${item.evd} EVD]` : `[+${item.def} DEF]`;
        action = `<span class="use" onclick="equipItem(${i})">[equip]</span>`;
      } else {
        label = item.name;
        stat = `[+${item.amount}HP]`;
        action = `<span class="use" onclick="useItem(${i})">[use]</span>`;
      }
      return `<div class="inv-item clickable">
        <span>${label} <span style="color:#7a9aaa">${stat}</span></span>
        <span>${action} <span class="use" style="color:#ff2a6d;margin-left:4px" onclick="event.stopPropagation();dropItem(${i})">[drop]</span></span>
      </div>`;
    }).join('');
  }
  inv.innerHTML = html;
}

function equipItem(idx) {
  if (state.gameOver || combatEnemy) return;
  let item = state.inventory[idx];
  if (!item || (item.type !== 'weapon' && item.type !== 'armor')) return;
  if (item.type === 'weapon') {
    let old = { ...state.weapon, type: 'weapon' };
    state.weapon = { name: item.name, dice: item.dice, bonus: item.bonus };
    state.inventory.splice(idx, 1);
    state.inventory.push(old);
  } else {
    // Unequip old armor, apply new DEF and EVD
    state.def -= state.armor.def;
    state.evd -= state.armor.evd;
    let old = { ...state.armor, type: 'armor' };
    state.armor = { name: item.name, def: item.def, evd: item.evd || 0 };
    state.def += item.def;
    state.evd += (item.evd || 0);
    state.inventory.splice(idx, 1);
    state.inventory.push(old);
  }
  addLog(`Equipped ${item.name}.`, 'info');
  render();
}

function useItem(idx) {
  if (state.gameOver) return;
  let item = state.inventory[idx];
  if (!item || item.type !== 'heal') return;
  state.hp = Math.min(state.maxHp, state.hp + item.amount);
  addLog(`Used ${item.name}. +${item.amount} HP.`, 'info');
  state.inventory.splice(idx, 1);
  render();
}

function dropItem(idx) {
  if (state.gameOver) return;
  let item = state.inventory[idx];
  if (!item) return;
  addLog(`Dropped ${item.name}.`, 'msg');
  state.inventory.splice(idx, 1);
  render();
}

function renderGrid() {
  let grid = document.getElementById('grid');
  grid.innerHTML = '';

  for (let y = 0; y < GRID_SIZE; y++) {
    for (let x = 0; x < GRID_SIZE; x++) {
      let cell = document.createElement('div');
      cell.className = 'cell';
      let key = `${x},${y}`;
      let room = state.grid[y][x];
      let dist = Math.abs(x - state.px) + Math.abs(y - state.py);

      let icon = '';
      if (x === state.px && y === state.py) {
        icon = '⬡';
        cell.classList.add('current');
      } else if (state.visited.has(key)) {
        cell.classList.add('visited');
        if (room.type === 'boss') icon = room.locked ? '🔒' : '◆';
        else if (room.type === 'key') { icon = '🔑'; if (room.cleared) cell.classList.add('cleared'); }
        else if (room.type === 'intel') { icon = '💡'; if (room.cleared) cell.classList.add('cleared'); }
        else if (room.type === 'vault') { icon = '⭐'; if (room.cleared) cell.classList.add('cleared'); }
        else if (room.type === 'vault2') { icon = '⭐'; if (room.cleared) cell.classList.add('cleared'); }
        else if (room.type === 'vault3') { icon = '⭐'; if (room.cleared) cell.classList.add('cleared'); }
        else if (room.type === 'enemy' && room.fled) icon = '⚠';
        else icon = '·';
      } else if (state.bossRevealed && x === state.bossRoom.x && y === state.bossRoom.y) {
        // Boss revealed by intel
        icon = state.grid[y][x].locked ? '🔒' : '◆';
      }

      // Adjacent cells
      if (dist === 1 && !state.gameOver) {
        cell.classList.add('adjacent');
        if (!state.visited.has(key) && !(state.bossRevealed && x===state.bossRoom.x && y===state.bossRoom.y)) {
          if (room.type === 'boss') icon = '🔒';
          else if (room.type === 'key') icon = '🔑';
          else if (room.type === 'intel') icon = '💡';
          else if (room.type === 'vault') icon = '⭐';
          else if (room.type === 'vault2') icon = '⭐';
          else if (room.type === 'vault3') icon = '⭐';
          else icon = '?';
        }
        cell.onclick = () => enterRoom(x, y);
      }

      // Also show revealed boss icon for non-adjacent
      if (state.bossRevealed && x === state.bossRoom.x && y === state.bossRoom.y && !state.visited.has(key)) {
        icon = state.grid[y][x].locked ? '🔒' : '◆';
      }

      cell.textContent = icon || (x === 0 && y === 0 ? '⚑' : '');
      grid.appendChild(cell);
    }
  }
}

// ==================== KEYBOARD ====================
document.addEventListener('keydown', (e) => {
  if (state.gameOver) return;
  if (document.getElementById('overlayContainer').innerHTML) return;

  if (combatEnemy) {
    if (e.key === 'Enter' || e.key === ' ' || e.key === 'a' || e.key === 'A') { e.preventDefault(); playerAttack(); }
    if (e.key === 'Escape' || e.key === 'f' || e.key === 'F') { e.preventDefault(); playerFlee(); }
    return;
  }

  // Boss prompt active — use combat panel but no combatEnemy
  let panel = document.getElementById('combatPanel');
  if (panel._pendingBoss) {
    if (e.key === 'Enter' || e.key === ' ' || e.key === 'a' || e.key === 'A') { e.preventDefault(); acceptBossFight(); }
    if (e.key === 'Escape') { e.preventDefault(); declineBoss(); }
    return;
  }

  let dx = 0, dy = 0;
  if (e.key === 'ArrowUp') dy = -1;
  if (e.key === 'ArrowDown') dy = 1;
  if (e.key === 'ArrowLeft') dx = -1;
  if (e.key === 'ArrowRight') dx = 1;

  if (dx === 0 && dy === 0) return;
  e.preventDefault();

  let nx = state.px + dx;
  let ny = state.py + dy;
  if (nx < 0 || nx >= GRID_SIZE || ny < 0 || ny >= GRID_SIZE) return;

  enterRoom(nx, ny);
});

// ==================== NEW GAME ====================
function newGame() {
  closeOverlay();
  state = {
    grid: [],
    px: 0, py: 0,
    hp: 20, maxHp: 20,
    atk: 2, def: 3, evd: 2,
    level: 1,
    xp: 0, xpToLevel: 10,
    creds: 0,
    weapon: { name: 'Rusty Pipe', dice: 4, bonus: 0 },
    armor: { name: 'Torn Jacket', def: 0, evd: 0 },
    inventory: [],
    hasKey: false,
    bossDefeated: false,
    bossRevealed: false,
    intelRoom: null,
    gameOver: false,
    visited: new Set(),
    bossRoom: null,
    keyRoom: null,
    vaultRoom: null,
    vaultRoom2: null,
    vaultRoom3: null,
  };
  combatEnemy = null;
  endCombat();
  state.visited.add('0,0');
  generateFloor();
  document.getElementById('log').innerHTML = '';
  addLog('System boot: Welcome to the Spire, runner. Find the key. Unlock the boss chamber. Survive.', 'msg');
  render();
}

// ==================== INIT ====================
newGame();
</script>
