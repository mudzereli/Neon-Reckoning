<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Reckoning</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%230a0a0f'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='monospace' font-size='18' font-weight='bold' fill='%23ff2a6d'%3ENR%3C/text%3E%3C/svg%3E">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;font-family:inherit}
body{
  background:#0a0a0f;
  color:#c0f0ff;
  font-family:'Cascadia Code','Consolas','Courier New',monospace;
  font-weight:600;
  -webkit-font-smoothing:antialiased;
  letter-spacing:0.5px;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  height:100vh;
  overflow:hidden;
}
#game{
  width:860px;
  max-width:100%;
  padding:8px;
  height:100vh;
  display:flex;
  flex-direction:column;
}
h1{
  text-align:center;
  color:#ff2a6d;
  text-shadow:0 0 10px #ff2a6d,0 0 30px #ff2a6d88;
  font-size:1.4rem;
  letter-spacing:3px;
  margin-bottom:1px;
}
.subtitle{
  text-align:center;
  color:#05d5ff;
  font-size:.75rem;
  margin-bottom:6px;
  letter-spacing:2px;
}
/* layout */
.row{display:flex;gap:8px;min-height:0}
.col-left{flex:0 0 auto;width:430px}
.col-right{flex:1;min-width:260px;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.col-right .panel{flex-shrink:0}
.col-right .panel-inv{flex:1;min-height:0;display:flex;flex-direction:column}
.col-right .panel-inv #inv{flex:1;overflow-y:auto;min-height:0}

/* panels */
.panel{
  border:1px solid #1a3a4a;
  background:#0d1117;
  padding:6px 8px;
  margin-bottom:6px;
}
.panel h2{
  color:#ff2a6d;
  font-size:.8rem;
  letter-spacing:2px;
  border-bottom:1px solid #1a3a4a;
  padding-bottom:2px;
  margin-bottom:4px;
}
/* grid */
#grid{
  display:grid;
  grid-template-columns:repeat(10,1fr);
  gap:2px;
  margin:0 auto;
  max-width:400px;
}
.cell{
  aspect-ratio:1;
  border:1px solid #1a3a4a;
  background:#0d1117;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1rem;
  cursor:pointer;
  transition:all .15s;
  position:relative;
}
.cell.visited{background:#0f1a22}
.cell.current{border-color:#ff2a6d;box-shadow:0 0 8px #ff2a6d88}
.cell.adjacent{border-color:#05d5ff55;cursor:pointer}
.cell.adjacent:hover{background:#05d5ff22;border-color:#05d5ff}
.cell.locked{opacity:.6}
.cell.cleared{background:#fffc33!important}
.cell.key{color:#ffcc00}
/* stats bars */
.stat-row{
  display:flex;
  justify-content:space-between;
  margin:1px 0;
  font-size:.8rem;
}
.bar-bg{
  width:100%;
  height:5px;
  background:#1a2a33;
  margin:1px 0 4px;
}
.bar-fill{
  height:100%;
  transition:width .3s;
}
.bar-hp{background:#ff2a6d}
.bar-xp{background:#05d5ff}
.stat-val{color:#ffcc00}
/* log */
#log{
  height:105px;
  overflow-y:auto;
  font-size:.78rem;
  line-height:1.4;
}
#log .msg{color:#7a9aaa}
#log .combat{color:#ff8c42}
#log .loot{color:#ffcc00}
#log .danger{color:#ff2a6d}
#log .info{color:#05d5ff}
#log .win{color:#39ff14}
/* dpad */
.dpad{
  display:grid;
  grid-template-columns:repeat(3,44px);
  grid-template-rows:repeat(3,44px);
  gap:3px;
  justify-content:center;
  margin:6px auto 2px;
}
.dpad-btn{
  background:#0d1117;
  border:1px solid #1a3a4a;
  color:#05d5ff;
  font-size:1.2rem;
  cursor:pointer;
  transition:all .12s;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:4px;
  user-select:none;
}
.dpad-btn:hover{background:#05d5ff22;border-color:#05d5ff}
.dpad-btn:active{background:#05d5ff44;border-color:#05d5ff;color:#fff}
.dpad-btn.up{grid-column:2;grid-row:1}
.dpad-btn.left{grid-column:1;grid-row:2}
.dpad-btn.center{grid-column:2;grid-row:2;border-color:#ff2a6d44;color:#ff2a6d;font-size:.9rem;pointer-events:none}
.dpad-btn.right{grid-column:3;grid-row:2}
.dpad-btn.down{grid-column:2;grid-row:3}
/* buttons */
.btn{
  background:#0d1117;
  border:1px solid #1a3a4a;
  color:#05d5ff;
  font-family:inherit;
  font-size:.78rem;
  padding:4px 10px;
  cursor:pointer;
  letter-spacing:1px;
  transition:all .15s;
}
.btn:hover{background:#05d5ff22;border-color:#05d5ff}
.btn.danger{color:#ff2a6d;border-color:#ff2a6d44}
.btn.danger:hover{background:#ff2a6d22;border-color:#ff2a6d}
.btn.gold{color:#ffcc00;border-color:#ffcc0044}
.btn.gold:hover{background:#ffcc0022;border-color:#ffcc00}
.btn-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
/* combat panel - inline */
#combatPanel{
  display:none;
  border:1px solid #ff8c42;
  background:#0f111a;
  padding:6px 8px;
  margin-bottom:6px;
}
#combatPanel.active{display:block}
#combatPanel h2{color:#ff8c42;font-size:.8rem;letter-spacing:2px;border-bottom:1px solid #3a2a1a;padding-bottom:2px;margin-bottom:4px}
#combatPanel .enemy-name{color:#ff8c42;font-weight:bold;font-size:.85rem}
#combatPanel .enemy-desc{color:#7a9aaa;font-size:.75rem;margin-bottom:4px}
/* inventory */
.inv-item{
  display:flex;
  justify-content:space-between;
  font-size:.78rem;
  padding:2px 3px;
  border-bottom:1px solid #1a2a3344;
}
.inv-item.clickable{cursor:pointer}
.inv-item.clickable:hover{background:#05d5ff11}
.inv-item .use{color:#39ff14;cursor:pointer}
.inv-item .use:hover{text-decoration:underline}
/* modal overlay - only for game over */
.overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:#000000cc;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:100;
}
.modal{
  background:#0d1117;
  border:2px solid #ff2a6d;
  padding:24px;
  max-width:400px;
  text-align:center;
  box-shadow:0 0 40px #ff2a6d44;
}
.modal h2{color:#ff2a6d;margin-bottom:12px;letter-spacing:3px}
.modal p{color:#7a9aaa;margin-bottom:14px;font-size:.8rem}
.dice-display{
  font-size:2rem;
  color:#ffcc00;
  margin:8px 0;
}
</style>
</head>
<body>
<div id="game">
  <h1>⚡ NEON RECKONING</h1>
  <div class="subtitle">// DESCEND INTO THE SPIRE //</div>
  <div class="row">
    <div class="col-left">
      <div class="panel">
        <h2>◈ GRID</h2>
        <div id="grid"></div>
        <div style="margin-top:6px;font-size:.65rem;color:#4a6a7a;text-align:center">
          ⬆⬇⬅➡ move &nbsp;|&nbsp; ◆ boss room &nbsp;|&nbsp; ⚑ start
        </div>
      </div>
    </div>
    <div class="col-right">
      <div class="panel">
        <h2>◈ STATS <span style="float:right;font-weight:normal;font-size:.7rem;color:#7a9aaa">LVL <span id="lvlVal" style="color:#ffcc00">1</span> &nbsp; ¢<span id="credsVal" style="color:#ffcc00">0</span></span></h2>
        <div class="stat-row"><span>HP</span><span class="stat-val" id="hpText">20/20</span></div>
        <div class="bar-bg"><div class="bar-fill bar-hp" id="hpBar" style="width:100%"></div></div>
        <div class="stat-row"><span>XP</span><span class="stat-val" id="xpText">0/10</span></div>
        <div class="bar-bg"><div class="bar-fill bar-xp" id="xpBar" style="width:0%"></div></div>
        <div class="stat-row">
          <span>ATK</span><span class="stat-val" id="atkVal">d4+2</span>
          <span style="margin-left:10px;color:#7a9aaa">DEF</span><span class="stat-val"><span id="defVal">3</span></span>
          <span style="margin-left:10px;color:#7a9aaa">EVD</span><span class="stat-val"><span id="evdVal">2</span></span>
        </div>
      </div>
      <div class="panel panel-inv">
        <h2>◈ INVENTORY <span style="float:right;font-weight:normal;font-size:.65rem" id="keyStatus">🔒 No key</span></h2>
        <div id="inv"></div>
      </div>
      <div class="panel">
        <h2>◈ ROOM</h2>
        <div id="roomArt" style="font-size:4rem;line-height:1.2;text-align:center;margin-bottom:4px"></div>
        <div id="roomDesc" style="font-size:.85rem;color:#7a9aaa;margin-bottom:6px"></div>
        <div id="roomSearchResult" style="font-size:.78rem;color:#ffcc00;margin-bottom:4px"></div>
        <button class="btn" id="searchBtn" onclick="searchRoom()" style="display:none;width:100%">🔍 Search Room</button>
      </div>
    </div>
  </div>
  <div style="display:flex;gap:8px;min-height:0">
    <div class="panel" style="flex:1;margin-bottom:0">
      <h2>◈ EVENT LOG</h2>
      <div id="log"><div class="msg">System booting...</div></div>
    </div>
    <div class="panel" style="margin-bottom:0;display:flex;align-items:center;justify-content:center;padding:4px 8px">
      <div class="dpad" style="margin:0">
        <button class="dpad-btn up" onclick="movePlayer(0,-1)" title="Up">▲</button>
        <button class="dpad-btn left" onclick="movePlayer(-1,0)" title="Left">◀</button>
        <div class="dpad-btn center" id="dpadSearchBtn" onclick="searchRoom()" title="Search Room" style="pointer-events:auto;cursor:pointer">🔍</div>
        <button class="dpad-btn right" onclick="movePlayer(1,0)" title="Right">▶</button>
        <button class="dpad-btn down" onclick="movePlayer(0,1)" title="Down">▼</button>
      </div>
    </div>
  </div>
  <div class="panel" id="combatPanel">
    <h2>⚔ COMBAT</h2>
    <div class="enemy-name" id="combatEnemyName"></div>
    <div class="enemy-desc" id="combatEnemyDesc"></div>
    <div class="stat-row"><span>Enemy HP</span><span class="stat-val" id="combatEnemyHp"></span></div>
    <div class="bar-bg"><div class="bar-fill bar-hp" id="combatEnemyHpBar"></div></div>
    <div class="stat-row"><span>Enemy ATK</span><span class="stat-val" id="combatEnemyAtk"></span> <span style="margin-left:8px">EVD</span><span class="stat-val" id="combatEnemyEvd"></span> <span style="margin-left:8px">DEF</span><span class="stat-val" id="combatEnemyDef"></span></div>
    <div class="stat-row" style="margin-top:6px"><span>Your  ATK</span><span class="stat-val" id="combatPlayerAtk"></span> <span style="margin-left:8px">EVD</span><span class="stat-val" id="combatPlayerEvd"></span> <span style="margin-left:8px">DEF</span><span class="stat-val" id="combatPlayerDef"></span></div>
    <div class="btn-row">
      <button class="btn danger" onclick="playerAttack()">⚔️ <u>A</u>ttack</button>
      <button class="btn" onclick="playerDefend()">🛡️ <u>D</u>efend</button>
      <button class="btn" id="fleeBtn" onclick="playerFlee()">↩ <u>F</u>lee</button>
    </div>
  </div>
  <div class="btn-row" style="justify-content:center;margin-top:6px">
    <button class="btn" onclick="newGame()">⟳ NEW RUN</button>
  </div>
</div>
<div id="overlayContainer"></div>

<script src="game.js"></script>
</body>
</html>
